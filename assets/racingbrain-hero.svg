<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RacingBrain autonomous race car brain</title>
  <desc id="desc">A stylized real-time localization, mapping, reliability, and planning-interface banner for RacingBrain.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#0B1F2A"/>
      <stop offset="1" stop-color="#151021"/>
    </linearGradient>
    <linearGradient id="track" x1="122" y1="339" x2="1158" y2="339" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15E0A8"/>
      <stop offset="0.5" stop-color="#50B7FF"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="0" fill="url(#bg)"/>
  <path d="M0 363 C126 310 242 319 360 350 C505 388 600 379 726 333 C878 278 1009 284 1280 337 L1280 420 L0 420 Z" fill="#091923"/>
