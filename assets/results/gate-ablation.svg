<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RacingBrain mapping gate ablation</title>
  <desc id="desc">A visual summary of mapping gate on versus off under the same replay.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="1" stop-color="#131B2E"/>
    </linearGradient>
    <linearGradient id="onBar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="offBar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <text x="70" y="76" fill="#F8FAFC" font-size="34" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">
    Mapping Gate A/B on the Same Replay
  </text>
  <text x="70" y="112" fill="#CBD5E1" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">
    Gate ON keeps the same final stable cones while reducing candidate residue and improving map stability.
  </text>

  <g transform="translate(70 150)">
    <rect width="250" height="190" rx="20" fill="#0F172A" stroke="#34D399" stroke-width="2"/>
    <text x="30" y="42" fill="#D1FAE5" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Gate ON</text>
    <text x="30" y="82" fill="#E2E8F0" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">Stable cones: 20</text>
    <text x="30" y="114" fill="#E2E8F0" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">Candidate residue: 7</text>
    <text x="30" y="146" fill="#E2E8F0" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">Stability score: 0.721</text>
    <text x="30" y="178" fill="#E2E8F0" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">Downweighted obs: 812</text>
  </g>

  <g transform="translate(350 150)">
    <rect width="250" height="190" rx="20" fill="#0F172A" stroke="#FB923C" stroke-width="2"/>
    <text x="30" y="42" fill="#FFEDD5" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Gate OFF</text>
    <text x="30" y="82" fill="#E2E8F0" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">Stable cones: 20</text>
    <text x="30" y="114" fill="#E2E8F0" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">Candidate residue: 11</text>
    <text x="30" y="146" fill="#E2E8F0" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">Stability score: 0.545</text>
    <text x="30" y="178" fill="#E2E8F0" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">Downweighted obs: 0</text>
  </g>

  <g transform="translate(645 140)">
    <text x="0" y="22" fill="#F8FAFC" font-size="22" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Delta</text>
    <text x="0" y="56" fill="#CBD5E1" font-size="17" font-family="Inter,Segoe UI,Arial,sans-serif">Candidate residue: -4</text>
    <rect x="0" y="74" width="280" height="16" rx="8" fill="#1E293B"/>
    <rect x="0" y="74" width="102" height="16" rx="8" fill="url(#onBar)"/>

    <text x="0" y="126" fill="#CBD5E1" font-size="17" font-family="Inter,Segoe UI,Arial,sans-serif">Stability score: +0.176</text>
    <rect x="0" y="144" width="280" height="16" rx="8" fill="#1E293B"/>
    <rect x="0" y="144" width="196" height="16" rx="8" fill="url(#onBar)"/>

    <text x="0" y="196" fill="#CBD5E1" font-size="17" font-family="Inter,Segoe UI,Arial,sans-serif">Stable cones unchanged</text>
    <rect x="0" y="214" width="280" height="16" rx="8" fill="#1E293B"/>
    <rect x="0" y="214" width="280" height="16" rx="8" fill="#94A3B8"/>

    <text x="0" y="270" fill="#E2E8F0" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">
      Insight: the gate does not chase a bigger map.
    </text>
    <text x="0" y="300" fill="#E2E8F0" font-size="18" font-family="Inter,Segoe UI,Arial,sans-serif">
      It protects the stable map from low-confidence growth.
    </text>
  </g>

  <g transform="translate(935 140)">
    <rect width="200" height="200" rx="20" fill="#0B1324" stroke="#38BDF8" stroke-width="2"/>
    <text x="100" y="44" text-anchor="middle" fill="#E0F2FE" font-size="22" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">
      Replay Facts
    </text>
    <text x="24" y="86" fill="#E2E8F0" font-size="17" font-family="Inter,Segoe UI,Arial,sans-serif">
      Backend: cluster fallback
    </text>
    <text x="24" y="118" fill="#E2E8F0" font-size="17" font-family="Inter,Segoe UI,Arial,sans-serif">
      Both runs: success = true
    </text>
    <text x="24" y="150" fill="#E2E8F0" font-size="17" font-family="Inter,Segoe UI,Arial,sans-serif">
      Same bag, same timing budget
    </text>
    <text x="24" y="182" fill="#E2E8F0" font-size="17" font-family="Inter,Segoe UI,Arial,sans-serif">
      Difference comes from mapping gate
    </text>
  </g>
</svg>
