<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">RacingBrain engineering signal flow</title>
  <desc id="desc">A PPT-ready signal-flow diagram for the RacingBrain autonomous racing localization and mapping stack.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4050"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5e34"/>
    </marker>
    <style>
      .bg { fill: #f8faf7; }
      .title { font: 700 48px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #132238; }
      .subtitle { font: 400 22px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #4b5b68; }
      .section { font: 700 24px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #24384a; }
      .box-title { font: 700 24px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #142131; }
      .box-text { font: 400 18px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #415362; }
      .topic { font: 600 17px "JetBrains Mono", "Noto Sans Mono CJK SC", Consolas, monospace; fill: #183246; }
      .small { font: 400 16px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #526575; }
      .tiny { font: 400 14px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #5d6d7a; }
      .command { font: 600 16px "JetBrains Mono", Consolas, monospace; fill: #183246; }
      .panel { fill: #ffffff; stroke: #d8e0e5; stroke-width: 2; rx: 14; }
      .input { fill: #eef6fb; stroke: #8dc3df; stroke-width: 2; rx: 12; }
      .perception { fill: #f5f8e8; stroke: #b9c86a; stroke-width: 2; rx: 12; }
      .fusion { fill: #fff4e6; stroke: #d99c48; stroke-width: 2; rx: 12; }
      .mapping { fill: #edf7f0; stroke: #69b88b; stroke-width: 2; rx: 12; }
      .output { fill: #f1effb; stroke: #a796df; stroke-width: 2; rx: 12; }
      .health { fill: #fff0f0; stroke: #d98383; stroke-width: 2; rx: 12; }
      .verify { fill: #e9f8f2; stroke: #49a87c; stroke-width: 2; rx: 12; }
      .op { fill: #ffffff; stroke: #ccd6dc; stroke-width: 2; rx: 12; }
      .arrow { fill: none; stroke: #2f4050; stroke-width: 3; marker-end: url(#arrow); }
      .arrow-thin { fill: none; stroke: #2f4050; stroke-width: 2.3; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #8b5e34; stroke-width: 2.4; stroke-dasharray: 9 7; marker-end: url(#arrow-soft); }
      .lane { fill: none; stroke: #dbe3e8; stroke-width: 2; stroke-dasharray: 6 10; }
      .chip { fill: #ffffff; stroke: #c7d4db; stroke-width: 1.5; rx: 8; }
      .chip-green { fill: #ecf8f0; stroke: #8fcfa7; stroke-width: 1.5; rx: 8; }
      .chip-orange { fill: #fff2df; stroke: #e2ad62; stroke-width: 1.5; rx: 8; }
      .chip-red { fill: #fff2f2; stroke: #e1a0a0; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>

  <text class="title" x="72" y="76">RacingBrain 工程信号流向</text>
  <text class="subtitle" x="74" y="112">面向无人智能赛车的 ROS 2 感知融合、GNSS/INS 辅助定位建图、健康监控与规划接口</text>

  <rect class="verify" x="1335" y="42" width="510" height="94"/>
  <text class="box-title" x="1362" y="78">本机回放验证</text>
  <text class="small" x="1362" y="107">2026-04-25：cluster 后端，链路成功；稳定锥桶 18，重复 0</text>
  <text class="small" x="1362" y="130">规划接口 221 帧，其中 79 帧 ready</text>

  <line class="lane" x1="358" y1="155" x2="358" y2="835"/>
  <line class="lane" x1="710" y1="155" x2="710" y2="835"/>
  <line class="lane" x1="1018" y1="155" x2="1018" y2="835"/>
  <line class="lane" x1="1327" y1="155" x2="1327" y2="835"/>

  <text class="section" x="84" y="176">1. 数据源</text>
  <text class="section" x="410" y="176">2. 感知</text>
  <text class="section" x="766" y="176">3. 融合</text>
  <text class="section" x="1066" y="176">4. 定位建图</text>
  <text class="section" x="1398" y="176">5. 输出与诊断</text>

  <rect class="input" x="78" y="210" width="242" height="108"/>
  <text class="box-title" x="104" y="245">相机</text>
  <text class="topic" x="104" y="277">/camera1/image_raw</text>
  <text class="small" x="104" y="300">sensor_msgs/Image</text>

  <rect class="input" x="78" y="365" width="242" height="108"/>
  <text class="box-title" x="104" y="400">激光雷达</text>
  <text class="topic" x="104" y="432">/lidar_points</text>
  <text class="small" x="104" y="455">PointCloud2</text>

  <rect class="input" x="78" y="520" width="242" height="116"/>
  <text class="box-title" x="104" y="555">GNSS/INS</text>
  <text class="topic" x="104" y="587">/gongji_gnss_ins_64</text>
  <text class="small" x="104" y="610">经纬度、姿态、速度、角速度</text>

  <rect class="input" x="78" y="690" width="242" height="100"/>
  <text class="box-title" x="104" y="725">实车或 rosbag</text>
  <text class="small" x="104" y="756">在线传感器 / 数据集回放</text>
  <text class="small" x="104" y="779">统一发布上述 3 类输入</text>

  <rect class="perception" x="405" y="210" width="260" height="134"/>
  <text class="box-title" x="431" y="247">YOLOv8 2D 锥桶</text>
  <text class="small" x="431" y="276">cone_detector/yolo_detector</text>
  <rect class="chip" x="430" y="294" width="170" height="31"/>
  <text class="topic" x="445" y="316">/yolo/cones</text>

  <rect class="perception" x="405" y="390" width="260" height="164"/>
  <text class="box-title" x="431" y="427">LiDAR 3D 锥桶</text>
  <text class="small" x="431" y="456">PointPillars / 聚类 / auto</text>
  <text class="small" x="431" y="483">可选 verifier 与后端仲裁</text>
  <rect class="chip" x="430" y="507" width="215" height="31"/>
  <text class="topic" x="445" y="529">/cone_detection_custom</text>

  <rect class="fusion" x="765" y="300" width="220" height="176"/>
  <text class="box-title" x="794" y="338">相机-LiDAR 融合</text>
  <text class="small" x="794" y="368">fs_fusion_box</text>
  <text class="small" x="794" y="395">时间同步 + 投影匹配</text>
  <text class="small" x="794" y="422">3D 坐标 + 颜色语义</text>
  <rect class="chip-orange" x="792" y="438" width="178" height="31"/>
  <text class="topic" x="806" y="460">/perception/fusion/map</text>

  <rect class="mapping" x="1065" y="250" width="232" height="250"/>
  <text class="box-title" x="1091" y="288">GNSS/INS 辅助建图</text>
  <text class="small" x="1091" y="318">slam/slam_node</text>
  <text class="small" x="1091" y="346">WGS84 -> UTM -> map 原点</text>
  <text class="small" x="1091" y="374">GNSS 与融合锥桶近似同步</text>
  <text class="small" x="1091" y="402">马氏距离关联 + 卡尔曼更新</text>
  <text class="small" x="1091" y="430">Log-Odds 稳定性评分</text>
  <rect class="chip-green" x="1090" y="453" width="173" height="31"/>
  <text class="small" x="1105" y="475">风险门控保护地图</text>

  <rect class="health" x="1065" y="580" width="232" height="164"/>
  <text class="box-title" x="1091" y="617">在线健康总线</text>
  <text class="small" x="1091" y="646">system_health_monitor</text>
  <text class="small" x="1091" y="673">汇总 YOLO / LiDAR / 融合 / 建图</text>
  <text class="small" x="1091" y="700">输出任务风险与运行预算</text>
  <rect class="chip-red" x="1090" y="713" width="185" height="31"/>
  <text class="topic" x="1105" y="735">/racingbrain/health/system</text>

  <rect class="output" x="1390" y="215" width="392" height="96"/>
  <text class="box-title" x="1416" y="252">稳定全局锥桶地图</text>
  <text class="topic" x="1416" y="283">/global_map</text>

  <rect class="output" x="1390" y="340" width="392" height="106"/>
  <text class="box-title" x="1416" y="377">诊断地图层</text>
  <text class="topic" x="1416" y="407">/mapping/candidate_cones</text>
  <text class="topic" x="1416" y="432">/mapping/rejected_observations</text>

  <rect class="output" x="1390" y="475" width="392" height="118"/>
  <text class="box-title" x="1416" y="512">车辆位姿与轨迹</text>
  <text class="topic" x="1416" y="543">/vehicle_odom  /vehicle_path</text>
  <text class="small" x="1416" y="568">TF：map -> base_link</text>

  <rect class="output" x="1390" y="624" width="392" height="120"/>
  <text class="box-title" x="1416" y="661">规划输入接口</text>
  <text class="topic" x="1416" y="692">/planning/track_graph</text>
  <text class="topic" x="1416" y="717">/racingbrain/planning/input_state</text>

  <rect class="output" x="1390" y="774" width="392" height="62"/>
  <text class="box-title" x="1416" y="812">RViz / 评估脚本 / 汇报数据</text>

  <path class="arrow" d="M 320 264 C 350 264 370 264 405 264"/>
  <path class="arrow" d="M 320 419 C 352 419 373 456 405 456"/>
  <path class="arrow" d="M 665 310 C 700 310 728 348 765 358"/>
  <path class="arrow" d="M 665 522 C 705 522 727 423 765 405"/>
  <path class="arrow" d="M 985 388 C 1018 388 1032 376 1065 376"/>
  <path class="arrow" d="M 320 578 C 695 578 836 270 1065 320"/>

  <path class="arrow" d="M 1297 295 C 1338 290 1352 264 1390 263"/>
  <path class="arrow-thin" d="M 1297 344 C 1344 350 1354 388 1390 394"/>
  <path class="arrow-thin" d="M 1297 410 C 1345 430 1350 525 1390 534"/>
  <path class="arrow-thin" d="M 1502 311 C 1502 348 1502 572 1502 624"/>
  <path class="arrow" d="M 1502 311 C 1502 350 1585 596 1585 624"/>

  <path class="arrow-soft" d="M 535 344 C 535 610 847 650 1065 650"/>
  <path class="arrow-soft" d="M 535 554 C 560 665 873 690 1065 690"/>
  <path class="arrow-soft" d="M 875 476 C 875 580 975 625 1065 625"/>
  <path class="arrow-soft" d="M 1175 500 C 1175 535 1175 545 1175 580"/>
  <path class="arrow-soft" d="M 1297 662 C 1320 628 1320 470 1297 440"/>

  <text class="tiny" x="350" y="250">Image</text>
  <text class="tiny" x="348" y="405">PointCloud2</text>
  <text class="tiny" x="683" y="294">2D 框/颜色</text>
  <text class="tiny" x="676" y="548">3D 锥桶</text>
  <text class="tiny" x="1000" y="365">融合 Map</text>
  <text class="tiny" x="690" y="560">位姿高频输入</text>
  <text class="tiny" x="1280" y="616">风险反馈</text>

  <rect class="op" x="78" y="872" width="1744" height="148"/>
  <text class="box-title" x="106" y="912">操作方式</text>
  <text class="small" x="106" y="946">构建核心链路：</text>
  <text class="command" x="244" y="946">./scripts/build_ros_clean.sh --packages-select gnss_ins_msg drd25_msgs slam ... racingbrain</text>
  <text class="small" x="106" y="976">在线启动：</text>
  <text class="command" x="244" y="976">ros2 launch racingbrain localization_mapping.launch.py lidar_backend:=auto track:=acceleration enable_planning:=true</text>
  <text class="small" x="106" y="1000">回放评估：</text>
  <text class="command" x="244" y="1000">LIDAR_BACKEND=cluster ENABLE_PLANNING=true ./scripts/run_dataset_mapping_eval.sh</text>
</svg>
