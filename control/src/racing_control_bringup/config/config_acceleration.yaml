simple_PID_controller_node:
  ros__parameters:
    control_time_step: 0.05
    # PID控制器参数
    lateral_KP: 0.9
    lateral_KI: 0.0
    lateral_KD: 0.0
    longitudinal_KP: 0.05
    longitudinal_KI: 0.0
    longitudinal_KD: 0.0
    # 限制
    min_accepted_wp_num: 2
    max_angle_error: 100.0
    max_angle_derivative: 150.0
    max_steer_diff: 1.5
    # 目标速度
    target_speed: 35.0

PID_controller_node_cpp:
  ros__parameters:
    control_time_step: 0.005
    lateral_K_PP: 0.08
    lateral_C_PP: 0.12
    lateral_I_PP: 0.0
    lateral_D_PP: 0.0
    longitudinal_KP: 0.05
    longitudinal_KI: 0.0
    longitudinal_KD: 0.0
    target_speed: 25.0

planner_node:
  ros__parameters:
    waypointsPublishInterval: 0.2
    # RRT
    frontConesDist: 15.0  # 桩筒搜索范围
    behindDist: 0.5  # 车辆后方距离
    # 左右桩筒判断
    nearRatio: 0.4  # 桩筒距离比例
    maxAngleDiff: 30.0  # 最大角度差
    # Delaunay
    maxAcceptedEdgeLength: 7.0  # 最大接受边长
    maxEdgePartsRatio: 3.0  # 交点分割边长最大比例
    maxSideDiffFactor: 0.8  # 左右桩筒数量差异系数
    maxwpAngleDiff: 50.0  # 路径点角度差异
    # 合并路径
    maxDistToSaveWaypoints: 5.0  # 最大保存路径点距离
    maxWaypointAmountToSave: 3  # 最大保存路径点数量
    # 直线相关
    forward_guidance_dist: 15  # 前瞻距离
    # 直线拟合
    fit_num_iterations: 5  # 拟合迭代次数
    fit_error_threshold: 0.5  # 拟合误差阈值
    fit_n_pts: 10  # 拟合随机选择的点数量
    saved_line_points_num_before_fitting: 5  # 拟合前保存的路径点数量
    publish_length: 15  # 发布路径长度
    track_length: 95 #直线赛道长度