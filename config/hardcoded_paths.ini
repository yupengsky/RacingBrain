; 这里集中维护所有仓库外部资源路径。
; 你复刻时，优先只改这个文件，不要把绝对路径硬编码回源码。

[models]
; 模型根目录，例如 /data/models/DRd26_SLAM
root = /abs/path/to/models
; 相机检测运行时模型
yolo_runtime = /abs/path/to/models/yolo_runtime.pt
; 预训练权重 / 初始化权重
yolo_pretrained = /abs/path/to/models/yolo_pretrained.pt

[datasets]
; 数据集总目录，例如 /data/datasets
root = /abs/path/to/datasets
; 默认 rosbag
rosbag_default = /abs/path/to/datasets/rosbag_default
; YOLO 导出目录
yolo_output_root = /abs/path/to/datasets/yolo_cone
; 训练/验证合并配置
combined_yaml = /abs/path/to/datasets/yolo_cone/cone_all.yaml

[training]
; 训练日志、权重输出目录
runs_root = /abs/path/to/models/runs

[outputs]
; 建图与点云导出目录
root = /abs/path/to/outputs
global_map_pcd = /abs/path/to/outputs/global_map.pcd
global_map_ply = /abs/path/to/outputs/global_map.ply

[notes]
; TODO:
; 1. 如果后续还会引入标定文件、外参缓存、回环词袋等资源，也统一挂在这里。
; 2. 代码内部尽量通过配置读取，避免再次出现 scattered hardcoded paths。
