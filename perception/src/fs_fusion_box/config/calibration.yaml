    # --- 外参矩阵 (LiDAR -> Camera) ---

    lidar_to_camera_matrix: [
       0.0311, -0.9994,  0.0140,  0.0235,
      -0.0818, -0.0165, -0.9965,  0.1762,
       0.9962,  0.0299, -0.0823,  0.0132,
       0.0,     0.0,     0.0,     1.0
    ]